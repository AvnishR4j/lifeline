name: Bug report
description: Report a Lifeline runtime or handoff problem.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: textarea
    attributes:
      label: What happened?
    validations:
      required: true
  - type: input
    attributes:
      label: Lifeline version
      placeholder: lifeline version
    validations:
      required: true
  - type: dropdown
    attributes:
      label: Operating system
      options: [macOS, Windows, Linux, WSL]
    validations:
      required: true
  - type: textarea
    attributes:
      label: Doctor output
      description: Remove usernames and paths you do not want to share.
      render: text
    validations:
      required: true
  - type: textarea
    attributes:
      label: Reproduction steps
    validations:
      required: true
