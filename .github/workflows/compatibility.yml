name: Weekly compatibility contracts

on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

jobs:
  parser-contracts:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install .
      - run: python -m unittest discover -s tests -v
      - run: python watch.py --selftest
      - run: lifeline doctor
        continue-on-error: true
