name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.9", "3.11", "3.13"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install build tools
        run: python -m pip install --upgrade pip build twine
      - name: Install Lifeline
        run: python -m pip install .
      - name: Unit and reliability tests
        run: python -m unittest discover -s tests -v
      - name: Limit detection self-test
        run: python watch.py --selftest
      - name: Compile modules
        run: python -m compileall -q .
      - name: Build distributions
        run: python -m build
      - name: Validate distributions
        run: python -m twine check dist/*
      - name: CLI smoke tests
        shell: bash
        run: |
          lifeline --help
          lifeline version
          lifeline switch claude >/tmp/lifeline-switch.txt 2>&1 && exit 1 || true
      - name: Verify Windows dependency
        if: runner.os == 'Windows'
        shell: pwsh
        run: python -c "import winpty; print('pywinpty available')"
      - name: Verify Unix has no pywinpty dependency
        if: runner.os != 'Windows'
        run: python -c "import importlib.util; assert importlib.util.find_spec('winpty') is None"

  package-install:
    needs: test
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - shell: bash
        run: python -m pip install dist/*.whl
      - run: lifeline --help
      - run: lifeline version
